<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makeover Mode Store</title>
    <style>
        *{
            box-sizing: border-box; margin: 0; padding: 0;
        }
        
        body {
            font-family:Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-color: pink;
        }

        header {
            background: white;
            color: black;
            padding: 15px; 10%;
            display: flex; 
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top:0;
            z-index: 10;
        }
        header a{
            color:plum;
            text-decoration: none;
            margin: 14px;
            font-size: 18px;
        }
        h1{
            text-align: center;
            margin: 40px;
            animation-name: pulse;
            animation-duration: 2s;
            animation-iteration-count: infinite;
            animation-direction: alternate; 
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.3); }
        }
        .product-grid{
            display: grid;
            grid-template-columns:repeat(2, 1fr); gap: 30px;
            padding: 0 10% 30px 10%;
        }
        .makeup{
            background: peachpuff;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: transform 0.4s ease;
        }
        .makeup:hover{
            transform: translateY(-10px) scale(1);
        }
        .makeup img{width:100%; height: 150px; object-fit: contain;}
        .buy-btn{
            display: inline-block;
            background-color: plum;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            padding: 10px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html">Home</a>
        <nav>
            <a href="https://www.sephora.com/shop/makeup-cosmetics">Makeup</a>
            <a href="https://www.sephora.com/shop/skincare">Skincare</a>
            <a href="https://www.sephora.com/shop/hair-products">Hair</a>
            <a href="https://www.sephora.com/shop/fragrance">Fragrance</a>
        </nav>
    </header>
    <h1><i>Makeup Your Own Rules</i></h1>
    <div class="product-grid">
        <div class="makeup"><img src="images/blush.webp"><h3>Patrick Ta Headlines Double-Take Creme & Powder Blush</h3><a href="#" class="buy-btn">Buy</a></div>
        <div class="makeup"><img src="images/sunscreen.webp"><h3>Shiseido Ultimate Sun Protector Sunscreen SPF 60+</h3><a href="#" class="buy-btn">Buy</a></div>
        <div class="makeup"><img src="images/hair.webp"><h3>Kerastase Gloss Absolu High-Shine Anti-Frizz Conditioner</h3><a href="#" class="buy-btn">Buy</a></div>
        <div class="makeup"><img src="images/perfume.webp"><h3>Valentino Donna Born in Roma Eau de Parfum</h3><a href="#" class="buy-btn">Buy</a></div>
    </div>
</body>
</html>
